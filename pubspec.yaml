name: nexfit
description: AI-Powered Fashion Wardrobe Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.0.0
  
  # UI Packages
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  
  # Image Processing
  palette_generator: ^0.3.3
  image: ^4.1.7
  
  # HTTP
  http: ^1.2.0
  
  # Image Picker
  image_picker: ^1.0.7
  
  # Permissions
  permission_handler: ^11.2.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
